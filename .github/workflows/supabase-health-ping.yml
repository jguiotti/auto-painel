name: Supabase health ping

on:
  schedule:
    # Daily 08:00 UTC (~05:00 America/Sao_Paulo) — keeps hosted project active
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase (RPC keep-alive)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PING_MODE: rpc
        run: node scripts/ping-supabase-health.mjs
