name: Supabase migrations check

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/deploy.manifest.json"
      - "scripts/supabase-*.mjs"
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: List local migrations
        run: |
          echo "Migrações versionadas: $(ls -1 supabase/migrations/*.sql | wc -l | tr -d ' ')"
          ls -1 supabase/migrations/*.sql | tail -5

      - name: Dry-run db push (preview only)
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: node scripts/supabase-deploy.mjs --dry-run
