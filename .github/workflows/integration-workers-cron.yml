name: Integration workers cron

on:
  schedule:
    # Every 15 minutes — drains classifieds + social publication queues
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: integration-workers-cron
  cancel-in-progress: false

jobs:
  invoke-workers:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Invoke classifieds-sync-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          INTEGRATION_WORKERS_CRON_SECRET: ${{ secrets.INTEGRATION_WORKERS_CRON_SECRET }}
          WORKER_LIMIT: "10"
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$INTEGRATION_WORKERS_CRON_SECRET" ]; then
            echo "Missing SUPABASE_URL or INTEGRATION_WORKERS_CRON_SECRET."
            echo "Run: npm run github:secrets:workers:manual"
            exit 1
          fi
          HTTP_CODE=$(curl -sS -o /tmp/classifieds-worker.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL%/}/functions/v1/classifieds-sync-worker" \
            -H "x-classifieds-worker-key: ${INTEGRATION_WORKERS_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{\"limit\": ${WORKER_LIMIT}}")
          cat /tmp/classifieds-worker.json
          echo ""
          echo "classifieds-sync-worker HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" -ge 400 ]; then
            exit 1
          fi

      - name: Invoke social-publish-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          INTEGRATION_WORKERS_CRON_SECRET: ${{ secrets.INTEGRATION_WORKERS_CRON_SECRET }}
          WORKER_LIMIT: "5"
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$INTEGRATION_WORKERS_CRON_SECRET" ]; then
            echo "Missing SUPABASE_URL or INTEGRATION_WORKERS_CRON_SECRET."
            exit 1
          fi
          HTTP_CODE=$(curl -sS -o /tmp/social-worker.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL%/}/functions/v1/social-publish-worker" \
            -H "x-social-worker-key: ${INTEGRATION_WORKERS_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{\"limit\": ${WORKER_LIMIT}}")
          cat /tmp/social-worker.json
          echo ""
          echo "social-publish-worker HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" -ge 400 ]; then
            exit 1
          fi
