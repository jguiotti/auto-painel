name: Lead notification dispatch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dispatch lead notification worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY."
            echo "GitHub → Settings → Secrets and variables → Actions"
            echo "  SUPABASE_URL = https://<project-ref>.supabase.co"
            echo "  SUPABASE_SERVICE_ROLE_KEY = service_role key (Dashboard → API)"
            exit 1
          fi
          node scripts/dispatch-lead-notification-worker.mjs
