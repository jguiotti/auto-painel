<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bem-vindo(a) — AutoPainel</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:12px;border:1px solid #e4e4e7;">
          <tr>
            <td style="padding:32px 32px 16px;text-align:center;">
              <img src="https://autopainel.com.br/logo-autopainel-horizontal.png" alt="AutoPainel" width="220" style="max-width:220px;height:auto;" />
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px;color:#18181b;font-size:15px;line-height:1.6;">
              <p style="margin:0 0 16px;">Olá!</p>
              <p style="margin:0 0 16px;">Sua conta na <strong>AutoPainel</strong> foi criada. Para acessar o painel, defina sua senha clicando no botão abaixo.</p>
              <p style="margin:0 0 24px;text-align:center;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#18181b;color:#ffffff;text-decoration:none;font-weight:600;font-size:15px;padding:12px 24px;border-radius:8px;">Definir minha senha</a>
              </p>
              <p style="margin:0 0 8px;font-size:13px;color:#71717a;">Este link expira em 1 hora. Se você não solicitou este acesso, ignore este e-mail.</p>
              <p style="margin:0;font-size:13px;color:#71717a;word-break:break-all;">Ou copie o link: {{ .ConfirmationURL }}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px;text-align:center;font-size:12px;color:#71717a;">
              © AutoPainel · <a href="https://autopainel.com.br" style="color:#71717a;">autopainel.com.br</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
